name: DOCKER-CI

on:
  push:
    branches:
      -main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - users: actions/checkout@v4      

      - name : Build image 
        run : docker build -t custom-nginx:latest .

      - name : Run image
        run : docker run -d -p 8080:80 custom-nginx

      
